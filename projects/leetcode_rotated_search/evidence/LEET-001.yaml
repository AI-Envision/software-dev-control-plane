algorithm: Binary-search style rotated sorted array search for unique integers.
complexity: O(log n) time, O(1) extra space.
claims_supported:
  - Finds target in a rotated sorted array with unique integers.
  - Returns -1 when target is absent.
  - Returns -1 for an empty array.
  - Handles single-element hit and miss cases.
  - Works for non-rotated sorted arrays.
  - Handles rotation-boundary cases.
  - Finds pivot element in a rotated array.
non_claims:
  - No support claimed for duplicate values.
  - No production-library claim.
  - No benchmark claim beyond algorithmic complexity.
  - No external service integration claim.
boundary_review:
  - No network/API usage.
  - No secrets.
  - No trading/arb repo dependency.
  - No ai-dev-platform dependency.
  - No unnecessary framework, service, or database.
  - No auto-push or auto-merge.
